<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watching | Novidra</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer; padding:20px;"><span>◈</span> NOVIDRA</div>
    </header>

    <main style="margin-top:80px; padding:20px; display:flex; flex-direction:column; align-items:center;">
        <video id="mainPlayer" controls style="width:100%; max-width:1000px; border-radius:12px; border:1px solid var(--border); box-shadow: 0 0 20px rgba(0,255,255,0.2);"></video>
        <div style="width:100%; max-width:1000px; margin-top:20px;">
            <h1 id="vWatchTitle" style="font-size:24px;">Loading video...</h1>
            <p id="vWatchStats" style="color:var(--text-dim);"></p>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Specific logic to play the video based on URL ID
        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('vid');
            if(videoId) loadWatchPage(videoId);
            checkLoginStatus();
        };
    </script>
</body>
</html>
