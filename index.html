<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novidra | Future of Video</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <div class="header-left">
            <div id="menu-toggle">☰</div>
            <div class="logo" onclick="window.location.href='index.html'"><span>◈</span> NOVIDRA</div>
        </div>
        
        <div class="search-bar">
            <input type="text" placeholder="Search Novidra" id="searchInput">
            <button class="search-btn">🔍</button>
        </div>
        
        <div class="header-right" style="display:flex; gap:15px; align-items:center;">
            <button id="uploadBtn" style="display:none; background:var(--accent); color:#000; border:none; padding:8px 15px; border-radius:4px; font-weight:bold; cursor:pointer;" onclick="window.location.href='upload.html'">➕ Upload</button>
            
            <div class="user-container">
                <button class="signin-btn" id="userBtn" onclick="handleUserClick()">👤 Sign In</button>
                <div class="dropdown-menu" id="userDropdown">
                    <div class="dropdown-item" onclick="alert('Settings coming soon!')">⚙️ Settings</div>
                    <hr>
                    <div class="dropdown-item logout" onclick="logout()">🚪 Logout</div>
                </div>
            </div>
        </div>
    </header>

    <main id="mainContent">
        <div class="grid" id="videoContainer">
            </div>
    </main>

    <div class="overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="mTitle">Join Novidra</h2>
            <p id="mSubtitle">The neon future of video</p>
            <input type="text" id="uName" placeholder="Username">
            <input type="password" id="uPass" placeholder="Password">
            <button class="btn-primary" onclick="handleAuth()">Continue</button>
            <p class="switch-text" onclick="swapAuth()" id="swapText">Create channel</p>
            <p class="cancel-text" onclick="toggleModal()">Cancel</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
